<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripPlanner - 旅行プランを共有</title>
<style>
body { font-family: -apple-system, sans-serif; text-align: center; padding: 40px 20px; background: #f5f5f7; }
.card { background: white; border-radius: 16px; padding: 32px; max-width: 400px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
h1 { font-size: 24px; margin-bottom: 8px; }
p { color: #666; font-size: 16px; }
.btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #007AFF; color: white; border-radius: 12px; text-decoration: none; font-weight: 600; }
</style>
<script>
// TODO: App Store公開後にIDを設定
var appStoreURL = "https://apps.apple.com/app/idXXXXXXXXX";
// 3秒後に自動リダイレクト
setTimeout(function() { window.location.href = appStoreURL; }, 3000);
</script>
</head>
<body>
<div class="card">
<h1>TripPlanner</h1>
<p>旅行プランが共有されました</p>
<p>アプリをインストールしてリンクを開いてください</p>
<p style="color:#999;font-size:13px;">3秒後にApp Storeへ移動します...</p>
<!-- TODO: App Store公開後にhrefを設定 -->
<a class="btn" href="https://apps.apple.com/app/idXXXXXXXXX">App Storeで開く</a>
</div>
</body>
</html>
